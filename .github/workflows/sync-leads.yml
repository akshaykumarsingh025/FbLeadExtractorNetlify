name: Auto-Sync Facebook Leads
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Sync Endpoint
        run: |
          curl -X POST "${{ secrets.PROD_URL }}/api/poll-leads" \
          -H "Content-Type: application/json"
