[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions/dist"
  base = "."

[build.environment]
  NODE_VERSION = "18"

[dev]
  framework = "vite"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
